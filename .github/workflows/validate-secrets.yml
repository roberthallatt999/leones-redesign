name: Validate Deployment Secrets

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/lc-**.yml'

jobs:
  validate-staging-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Staging Secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          STAGE_DB_HOST: ${{ secrets.STAGE_DB_HOST }}
          STAGE_DB_USER: ${{ secrets.STAGE_DB_USER }}
          STAGE_DB_PASS: ${{ secrets.STAGE_DB_PASS }}
          STAGE_DB_NAME: ${{ secrets.STAGE_DB_NAME }}
          STAGE_BASE_PATH: ${{ secrets.STAGE_BASE_PATH }}
        run: |
          missing_secrets=()

          [[ -z "$SERVER_HOST" ]]     && missing_secrets+=("SERVER_HOST")
          [[ -z "$SERVER_USER" ]]     && missing_secrets+=("SERVER_USER")
          [[ -z "$SSH_PRIVATE_KEY" ]] && missing_secrets+=("SSH_PRIVATE_KEY")
          [[ -z "$STAGE_DB_HOST" ]]   && missing_secrets+=("STAGE_DB_HOST")
          [[ -z "$STAGE_DB_USER" ]]   && missing_secrets+=("STAGE_DB_USER")
          [[ -z "$STAGE_DB_PASS" ]]   && missing_secrets+=("STAGE_DB_PASS")
          [[ -z "$STAGE_DB_NAME" ]]   && missing_secrets+=("STAGE_DB_NAME")
          [[ -z "$STAGE_BASE_PATH" ]] && missing_secrets+=("STAGE_BASE_PATH")

          [[ -n "$SERVER_HOST" ]]     && echo "✅ SERVER_HOST is set"     || echo "❌ SERVER_HOST is missing"
          [[ -n "$SERVER_USER" ]]     && echo "✅ SERVER_USER is set"     || echo "❌ SERVER_USER is missing"
          [[ -n "$SSH_PRIVATE_KEY" ]] && echo "✅ SSH_PRIVATE_KEY is set" || echo "❌ SSH_PRIVATE_KEY is missing"
          [[ -n "$STAGE_DB_HOST" ]]   && echo "✅ STAGE_DB_HOST is set"   || echo "❌ STAGE_DB_HOST is missing"
          [[ -n "$STAGE_DB_USER" ]]   && echo "✅ STAGE_DB_USER is set"   || echo "❌ STAGE_DB_USER is missing"
          [[ -n "$STAGE_DB_PASS" ]]   && echo "✅ STAGE_DB_PASS is set"   || echo "❌ STAGE_DB_PASS is missing"
          [[ -n "$STAGE_DB_NAME" ]]   && echo "✅ STAGE_DB_NAME is set"   || echo "❌ STAGE_DB_NAME is missing"
          [[ -n "$STAGE_BASE_PATH" ]] && echo "✅ STAGE_BASE_PATH is set" || echo "❌ STAGE_BASE_PATH is missing"

          if [ ${#missing_secrets[@]} -ne 0 ]; then
            echo "❌ Missing required staging secrets: ${missing_secrets[*]}"
            exit 1
          fi

          echo "All staging secrets are set ✅"

  validate-production-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Production Secrets
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PROD_DB_HOST: ${{ secrets.PROD_DB_HOST }}
          PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
          PROD_DB_PASS: ${{ secrets.PROD_DB_PASS }}
          PROD_DB_NAME: ${{ secrets.PROD_DB_NAME }}
          PROD_BASE_PATH: ${{ secrets.PROD_BASE_PATH }}
        run: |
          missing_secrets=()

          [[ -z "$PROD_SERVER_HOST" ]] && missing_secrets+=("PROD_SERVER_HOST")
          [[ -z "$PROD_SERVER_USER" ]] && missing_secrets+=("PROD_SERVER_USER")
          [[ -z "$SSH_PRIVATE_KEY" ]]  && missing_secrets+=("SSH_PRIVATE_KEY")
          [[ -z "$PROD_DB_HOST" ]]     && missing_secrets+=("PROD_DB_HOST")
          [[ -z "$PROD_DB_USER" ]]     && missing_secrets+=("PROD_DB_USER")
          [[ -z "$PROD_DB_PASS" ]]     && missing_secrets+=("PROD_DB_PASS")
          [[ -z "$PROD_DB_NAME" ]]     && missing_secrets+=("PROD_DB_NAME")
          [[ -z "$PROD_BASE_PATH" ]]   && missing_secrets+=("PROD_BASE_PATH")

          [[ -n "$PROD_SERVER_HOST" ]] && echo "✅ PROD_SERVER_HOST is set" || echo "❌ PROD_SERVER_HOST is missing"
          [[ -n "$PROD_SERVER_USER" ]] && echo "✅ PROD_SERVER_USER is set" || echo "❌ PROD_SERVER_USER is missing"
          [[ -n "$SSH_PRIVATE_KEY" ]]  && echo "✅ SSH_PRIVATE_KEY is set"  || echo "❌ SSH_PRIVATE_KEY is missing"
          [[ -n "$PROD_DB_HOST" ]]     && echo "✅ PROD_DB_HOST is set"     || echo "❌ PROD_DB_HOST is missing"
          [[ -n "$PROD_DB_USER" ]]     && echo "✅ PROD_DB_USER is set"     || echo "❌ PROD_DB_USER is missing"
          [[ -n "$PROD_DB_PASS" ]]     && echo "✅ PROD_DB_PASS is set"     || echo "❌ PROD_DB_PASS is missing"
          [[ -n "$PROD_DB_NAME" ]]     && echo "✅ PROD_DB_NAME is set"     || echo "❌ PROD_DB_NAME is missing"
          [[ -n "$PROD_BASE_PATH" ]]   && echo "✅ PROD_BASE_PATH is set"   || echo "❌ PROD_BASE_PATH is missing"

          if [ ${#missing_secrets[@]} -ne 0 ]; then
            echo "❌ Missing required production secrets: ${missing_secrets[*]}"
            echo "(Production secrets may not be configured yet — this is expected during the staging-only phase.)"
            exit 1
          fi

          echo "All production secrets are set ✅"
